# Default base configuration file

CONFIG_TEST=y

# eliminate timer interrupts during the benchmark
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1

# We use irq_offload(), enable it
CONFIG_IRQ_OFFLOAD=y

# Reduce memory/code footprint
CONFIG_BT=n
CONFIG_FORCE_NO_ASSERT=y

CONFIG_TEST_HW_STACK_PROTECTION=n
# Disable HW Stack Protection (see #28664)
CONFIG_HW_STACK_PROTECTION=n
CONFIG_COVERAGE=n

# Disable system power management
CONFIG_PM=n

CONFIG_TIMING_FUNCTIONS=y

CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_APPLICATION_DEFINED_SYSCALL=y

# Disable time slicing
CONFIG_TIMESLICING=n

# Enable events
CONFIG_EVENTS=y

# no networking - disable interruptions...
CONFIG_NETWORKING=n

# need to be able to at least print floats
CONFIG_SKADI_LIBC_SUPPORTS_FPU=y

# %s is used everywhere...
CONFIG_SKADI_LIBRARY_PRINTF_STRING_BYTES_OUT_SUPPORT=y

CONFIG_SPEED_OPTIMIZATIONS=y

CONFIG_REQUIRES_FLOAT_PRINTF=y
CONFIG_SKADI_COUNT_SUBSYSTEM_CALLS=y
CONFIG_SKADI_MARK_THREAD_IN_TRAMPOLINE=y

# needs to be big enough for result buffer on zephyr
CONFIG_TEST_EXTRA_STACK_SIZE=65024
