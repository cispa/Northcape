CONFIG_POSIX_TIMERS=y
CONFIG_POSIX_THREADS=y
CONFIG_POSIX_MULTI_PROCESS=y
CONFIG_SKADI_LIBC_SUPPORTS_FPU=y
# very large initial heap needed for stream's .bss
CONFIG_SKADI_INIT_ALLOC_HEAP_SIZE=280144008
CONFIG_NETWORKING=n
CONFIG_DMA=n
CONFIG_ETH_DRIVER=n
# printf support
CONFIG_SKADI_LIBRARY_PRINTF_STRING_BYTES_OUT_SUPPORT=y
CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_REQUIRES_FLOAT_PRINTF=y
