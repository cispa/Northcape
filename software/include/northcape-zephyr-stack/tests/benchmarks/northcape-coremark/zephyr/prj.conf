# This file sets required zephyr configuration options

CONFIG_POSIX_THREADS=y
CONFIG_TIMING_FUNCTIONS=y
# will warn and default to NO_FPU in case a hardware FPU does not exist
CONFIG_FPU=y
CONFIG_POSIX_TIMERS=y
CONFIG_POSIX_MULTI_PROCESS=y
# need the libc to support FPU for printing doubles
CONFIG_SKADI_LIBC_SUPPORTS_FPU=y
# no distractions
CONFIG_NETWORKING=n
CONFIG_DMA=n
CONFIG_ETH_DRIVER=n
CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_REQUIRES_FLOAT_PRINTF=y
