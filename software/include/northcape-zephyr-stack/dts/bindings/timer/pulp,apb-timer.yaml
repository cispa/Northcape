description: |
  Xilinx AXI DMA LogiCORE IP controller with compatibility string
  generated in use with the AXI Ethernet subsystem.

include: base.yaml

# this is the compatible generated by Vitis for the AXI Ethernet subsystem
compatible: "pulp,apb_timer"

properties:
  reg:
    required: true

  interrupts:
    type: array
    description: Pairs of IRQ number for overflow and match
    required: true

  interrupt-parent:
    type: phandle
    description: Interrupt controller that the timer is connected to

  pulp,clock-period-ns:
    type: int
    description: Timer clock period in ns
    required: true

