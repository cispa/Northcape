# General config
CONFIG_REQUIRES_FULL_LIBC=y

# Networking config
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y

# Network driver config
CONFIG_TEST_RANDOM_GENERATOR=y

# Network address config
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"

# Networking tweaks
# Required to handle large number of consecutive connections,
# e.g. when testing with ApacheBench.
CONFIG_NET_TCP_TIME_WAIT_DELAY=0

# Network debug config
CONFIG_NET_LOG=y
#CONFIG_NET_SHELL=y

# Skadi-specific configs
CONFIG_SKADI_SUBSYSTEM_PROVIDES_MAIN=y
CONFIG_SKADI_NET_ZEROCOPY=y
CONFIG_SKADI_LIBRARY_PRINTF_STRING_BYTES_OUT_SUPPORT=y
CONFIG_SKADI_LIBC_SUPPORTS_FPU=y
CONFIG_REQUIRES_FLOAT_PRINTF=y

CONFIG_PTP_CLOCK_HA1588=y
CONFIG_PTP_CLOCK=y
CONFIG_NET_PKT_TIMESTAMP_THREAD=y
CONFIG_NET_PKT_TIMESTAMP=y
CONFIG_NET_L2_PTP=y
# do not want these to interfere...
CONFIG_PTP=n
CONFIG_NET_GPTP=n

# CONFIG_ETHERNET_LOG_LEVEL_DBG=y
CONFIG_HA155_TIMESTAMP_ALL_RX=y
CONFIG_HA155_TIMESTAMP_ALL_TX=y
CONFIG_NET_CONTEXT_TIMESTAMP_SOCKOPT=y
CONFIG_NET_CONTEXT_TIMESTAMPING=y
CONFIG_NET_CONTEXT_TXTIME=y

CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_SKADI_COUNT_SUBSYSTEM_CALLS=y
# enough stack for benchmark buffer
CONFIG_MAIN_STACK_SIZE=16384
