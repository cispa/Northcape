CONFIG_NETWORKING=y
CONFIG_NET_LOG=y
CONFIG_LOG=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=n
CONFIG_NET_UDP=y

CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_MAX_CONTEXTS=10

CONFIG_INIT_STACKS=y
CONFIG_PRINTK=y
CONFIG_NET_SHELL=y

# Ethernet is needed for gPTP
CONFIG_NET_L2_ETHERNET=y

CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_SETTINGS=y

# First ethernet interface will use these settings
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"

# board settings
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# gPTP settings
CONFIG_PTP_CLOCK=y
CONFIG_PTP_CLOCK_HA1588=y
CONFIG_NET_GPTP=y
CONFIG_NET_GPTP_LOG_LEVEL_INF=y
CONFIG_NET_GPTP_STACK_SIZE=4096
CONFIG_NET_PKT_TIMESTAMP_STACK_SIZE=4096
# 2 ms
CONFIG_NET_GPTP_NEIGHBOR_PROP_DELAY_THR=2000000
# measurement
CONFIG_NET_GPTP_EXTRA_PROP_CALLBACK=y
CONFIG_NET_GPTP_EXTRA_SYNC_TX_CALLBACK=y

# can become grandmaster
CONFIG_NET_GPTP_GM_CAPABLE=y

CONFIG_LOG_MODE_IMMEDIATE=y

CONFIG_NET_GPTP_CLOCK_ACCURACY_25NS=y
CONFIG_NET_GPTP_INIT_LOG_SYNC_ITV=0
